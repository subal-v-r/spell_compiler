<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell Compiler System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app-wrapper">
    <header>
        <h1>⚡ Compiler Spell Check</h1>
        <p>A multi-phase NLP compiler to identify and correct English text syntax and orthography.</p>
    </header>

    <main class="grid-layout">
        <!-- Input Panel -->
        <section class="card input-section">
            <h2>1. Source Text</h2>
            
            <form id="compilerForm">
                <div class="form-group">
                    <label for="textInput">Enter text manually:</label>
                    <textarea id="textInput" placeholder="Type a sentence with typos hear..."></textarea>
                </div>
                
                <div class="divider">OR</div>

                <div class="form-group file-group">
                    <label for="fileInput" class="file-label">
                        <span id="fileName">Select a .txt file</span>
                    </label>
                    <input type="file" id="fileInput" accept=".txt">
                </div>

                <button type="submit" class="btn-primary" id="compileBtn">
                    <span>Compile</span>
                    <div class="loader" id="compileLoader" style="display:none;"></div>
                </button>
            </form>
        </section>

        <!-- Pipeline Status / Details -->
        <section class="card results-section" id="resultsSection" style="display: none;">
            <!-- Output Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-target="correctedView">Corrected Output</button>
                <button class="tab-btn" data-target="issuesView">Identified Issues</button>
                <button class="tab-btn" data-target="tokensView">Lexical Tokens</button>
            </div>

            <!-- Tab Contents -->
            <div class="tab-content active" id="correctedView">
                <div class="output-box" id="finalCorrectedText"></div>
                <button class="btn-secondary mt-3" id="downloadBtn" style="display:none;">Download Result</button>
            </div>

            <div class="tab-content" id="issuesView">
                <h3>Spelling Errors</h3>
                <div id="spellingErrorsList" class="issue-list"></div>

                <h3 class="mt-3">Syntax & Grammar</h3>
                <div id="grammarErrorsList" class="issue-list"></div>
            </div>

            <div class="tab-content" id="tokensView">
                <p class="helper-text">Hover over tokens to see exact compiler phase structure.</p>
                <div id="tokensContainer" class="token-container"></div>
            </div>
        </section>
    </main>
</div>

<script src="/static/script.js"></script>
</body>
</html>
